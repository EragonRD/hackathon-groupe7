server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;

  location /hls/ {
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Authorization,Range,Content-Type" always;
    add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;

    # auth_request interroge le Core AVANT de servir le segment : si le Core
    # renvoie 403 (débit de scraping), nginx refuse le segment -> blocage réel.
    # Le Core enregistre aussi la requête (détection en fenêtre glissante).
    auth_request /_security_auth;
    error_page 401 403 = @scrape_denied;

    try_files $uri =404;
  }

  location @scrape_denied {
    add_header Access-Control-Allow-Origin "*" always;
    return 403 "Acces refuse : debit de scraping suspect";
  }

  location /keys/ {
    return 404;
  }

  location = /_security_auth {
    internal;
    proxy_pass http://core:3000/security/ingest;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
