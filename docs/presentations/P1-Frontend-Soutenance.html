<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Poulpium — Soutenance P1 (Frontend)</title>
<style>
  /* ===== Design system Poulpium (dark studio) ===== */
  :root{
    --bg:#0a0c0f; --bg-1:#101319; --bg-2:#161a21; --bg-3:#1d222b; --inset:#07090c;
    --line:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.14);
    --text:#e9ebef; --dim:#9aa2ae; --faint:#5d646f;
    --accent:#3d6dfd; --accent-2:#5b85ff; --accent-soft:rgba(61,109,253,.15); --accent-line:rgba(61,109,253,.45);
    --grad:linear-gradient(100deg,var(--accent),#29c5e6);
    --ok:#2ec27e; --warn:#f5a623; --danger:#ff5b5b;
    --amber:#f5a623; --cyan:#29c5e6; --violet:#b07bff;
    --r-sm:8px; --r-md:14px; --r-lg:22px; --r-pill:999px;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"SFMono-Regular","JetBrains Mono","Cascadia Code",Consolas,Menlo,monospace;
    color-scheme:dark;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--text);font-family:var(--sans);
    overflow:hidden;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;
  }
  /* atmosphère */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;will-change:transform;
    background:
      radial-gradient(900px 600px at 12% -8%, rgba(61,109,253,.16), transparent 60%),
      radial-gradient(760px 520px at 100% 110%, rgba(41,197,230,.10), transparent 55%);
  }
  /* Signature P1 : une "regle temporelle" qui s'estompe (echo de la timeline de revue) */
  body::after{
    content:"";position:fixed;left:0;right:0;bottom:0;height:140px;z-index:0;pointer-events:none;opacity:.6;
    background:
      repeating-linear-gradient(90deg,rgba(255,255,255,.05) 0 1px,transparent 1px 58px),
      repeating-linear-gradient(90deg,rgba(255,255,255,.09) 0 1.5px,transparent 1.5px 232px);
    -webkit-mask:linear-gradient(0deg,#000,transparent);mask:linear-gradient(0deg,#000,transparent);
  }

  /* ===== Deck ===== */
  #deck{position:fixed;inset:0;z-index:1}
  .slide{
    position:absolute;inset:0;display:flex;flex-direction:column;
    padding:clamp(28px,5vw,84px);
    opacity:0;visibility:hidden;transform:translateY(14px) scale(.995);
    transition:opacity .5s var(--ease,cubic-bezier(.16,1,.3,1)),transform .5s var(--ease,cubic-bezier(.16,1,.3,1)),visibility .5s;
  }
  .slide.active{opacity:1;visibility:visible;transform:none}
  .slide.past{transform:translateY(-14px) scale(.995)}

  /* HUD */
  /* HUD = un scrubber de lecteur video (signature P1) */
  #hud{position:fixed;z-index:20;left:0;right:0;bottom:0;height:4px;background:rgba(255,255,255,.06)}
  #bar{height:100%;width:0;background:var(--grad);transition:width .5s var(--ease,ease);position:relative}
  #bar::after{content:"";position:absolute;right:-6px;top:50%;transform:translateY(-50%);
    width:12px;height:12px;border-radius:50%;background:#fff;
    box-shadow:0 0 0 3px var(--accent-line),0 0 16px rgba(61,109,253,.75)}
  #counter{position:fixed;z-index:20;right:clamp(20px,3vw,42px);bottom:16px;
    font-family:var(--mono);font-size:12px;color:var(--dim);font-variant-numeric:tabular-nums;letter-spacing:.08em;
    display:flex;align-items:center;gap:8px;background:var(--bg-2);border:1px solid var(--line);padding:5px 11px;border-radius:var(--r-pill)}
  #counter::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--grad);box-shadow:0 0 10px rgba(61,109,253,.7)}
  #counter b{color:var(--text)}
  /* les puces = des marqueurs de commentaire poses sur la timeline */
  #dots{position:fixed;z-index:20;left:50%;transform:translateX(-50%);bottom:16px;display:flex;gap:9px}
  #dots button{width:8px;height:8px;border:0;background:rgba(255,255,255,.20);cursor:pointer;padding:0;
    transform:rotate(45deg);border-radius:2px;transition:all .3s var(--ease,ease)}
  #dots button.on{background:var(--grad);box-shadow:0 0 12px rgba(61,109,253,.6);transform:rotate(45deg) scale(1.5)}
  #brand-hud{position:fixed;z-index:20;left:clamp(20px,3vw,42px);bottom:16px;display:flex;align-items:center;gap:8px;opacity:.6}
  #brand-hud img{width:16px;height:16px}
  #brand-hud span{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--faint);text-transform:uppercase}

  /* Building blocks */
  .kicker{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:13px;
    text-transform:uppercase;letter-spacing:.16em;color:var(--accent-2);margin-bottom:18px}
  .kicker::before{content:"";width:26px;height:2px;background:var(--accent);border-radius:2px}
  h1{font-size:clamp(34px,4.6vw,64px);line-height:1.02;font-weight:800;letter-spacing:-.03em}
  h2{font-size:clamp(26px,3.4vw,46px);line-height:1.05;font-weight:800;letter-spacing:-.025em}
  .lede{font-size:clamp(15px,1.4vw,20px);color:var(--dim);line-height:1.5;max-width:60ch;margin-top:16px;font-weight:400}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums}

  /* Browser frame mockup */
  .frame{border:1px solid var(--line-strong);border-radius:var(--r-lg);overflow:hidden;
    background:var(--bg-1);box-shadow:0 30px 80px rgba(0,0,0,.55),0 2px 0 rgba(255,255,255,.03) inset}
  .frame-bar{display:flex;align-items:center;gap:7px;padding:11px 14px;background:var(--bg-2);border-bottom:1px solid var(--line)}
  .frame-bar i{width:11px;height:11px;border-radius:50%;background:#2b313b;display:block}
  .frame-bar i:nth-child(1){background:#ff5f57}.frame-bar i:nth-child(2){background:#febc2e}.frame-bar i:nth-child(3){background:#28c840}
  .frame-bar .url{margin-left:12px;font-family:var(--mono);font-size:12px;color:var(--faint);
    background:var(--inset);padding:5px 12px;border-radius:var(--r-pill);border:1px solid var(--line)}
  .frame img{display:block;width:100%;height:auto}

  /* Layout helpers */
  .split{display:grid;grid-template-columns:1fr 1.25fr;gap:clamp(24px,3.4vw,64px);align-items:center;flex:1;min-height:0}
  .split.rev{grid-template-columns:1.25fr 1fr}
  .split .txt{min-width:0}
  .split .media{min-width:0}
  .center{flex:1;display:flex;flex-direction:column;justify-content:center}

  ul.feat{list-style:none;margin-top:26px;display:flex;flex-direction:column;gap:15px}
  ul.feat li{display:flex;gap:13px;align-items:flex-start;font-size:clamp(14px,1.15vw,17px);line-height:1.4}
  ul.feat li::before{content:"";flex:0 0 auto;width:8px;height:8px;margin-top:7px;border-radius:2px;
    background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  ul.feat li b{color:var(--text);font-weight:700}
  ul.feat li span{color:var(--dim)}

  .chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px}
  .chip{font-family:var(--mono);font-size:12.5px;color:var(--text);background:var(--bg-2);
    border:1px solid var(--line-strong);padding:8px 13px;border-radius:var(--r-pill);display:inline-flex;gap:8px;align-items:center}
  .chip .d{width:9px;height:9px;border-radius:50%}

  /* Cover */
  .cover{align-items:flex-start;justify-content:center}
  .cover .logo{display:flex;align-items:center;gap:18px;margin-bottom:34px}
  .cover .logo img{width:64px;height:64px;filter:drop-shadow(0 8px 24px rgba(61,109,253,.5))}
  .cover .logo .word{font-size:clamp(38px,5vw,72px);font-weight:800;letter-spacing:-.03em;
    background:linear-gradient(90deg,#cdd6ff,var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .cover .meta{margin-top:38px;display:flex;flex-direction:column;gap:7px}
  .cover .meta .row{display:flex;gap:12px;align-items:center;font-size:15px;color:var(--dim)}
  .cover .meta .row .tag{font-family:var(--mono);font-size:12px;color:var(--accent-2);
    border:1px solid var(--accent-line);background:var(--accent-soft);padding:3px 10px;border-radius:var(--r-pill)}
  .cover .team{margin-top:6px;font-family:var(--mono);font-size:13px;color:var(--faint);letter-spacing:.04em}

  /* Before/After */
  .ba{display:grid;grid-template-columns:1fr auto 1fr;gap:clamp(18px,2.6vw,44px);align-items:stretch;flex:1;min-height:0}
  .card{border:1px solid var(--line);border-radius:var(--r-md);padding:clamp(22px,2.6vw,38px);display:flex;flex-direction:column;justify-content:center}
  .card.bad{background:linear-gradient(180deg,rgba(255,91,91,.06),transparent);border-color:rgba(255,91,91,.28)}
  .card.good{background:linear-gradient(180deg,var(--accent-soft),transparent);border-color:var(--accent-line)}
  .card .tag{font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.14em;margin-bottom:16px}
  .card.bad .tag{color:var(--danger)}.card.good .tag{color:var(--accent-2)}
  .card .big{font-size:clamp(19px,2vw,26px);font-weight:700;line-height:1.25}
  .card .sub{color:var(--dim);margin-top:12px;font-size:15px;line-height:1.5}
  .card .mail{font-family:var(--mono);font-size:13px;color:var(--dim);background:var(--inset);
    border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 14px;margin-top:16px;line-height:1.5}
  .arrow{display:flex;align-items:center;color:var(--faint);font-size:30px}

  /* Callouts on hero */
  .callout-wrap{position:relative}
  .callout{position:absolute;font-family:var(--mono);font-size:12px;color:var(--text);
    background:rgba(16,19,25,.92);border:1px solid var(--accent-line);padding:7px 11px;border-radius:var(--r-pill);
    box-shadow:0 8px 24px rgba(0,0,0,.5);backdrop-filter:blur(4px);white-space:nowrap}
  .callout .d{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle}

  /* Architecture */
  .arch{display:flex;gap:16px;align-items:stretch;margin-top:12px}
  .node{flex:1;border:1px solid var(--line-strong);border-radius:var(--r-md);padding:22px;background:var(--bg-1);position:relative}
  .node.hi{border-color:var(--accent-line);background:linear-gradient(180deg,var(--accent-soft),var(--bg-1))}
  .node .t{font-weight:800;font-size:18px;margin-bottom:6px}
  .node .s{color:var(--dim);font-size:13.5px;line-height:1.45}
  .node .tag{position:absolute;top:-10px;left:20px;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;
    text-transform:uppercase;background:var(--bg-3);border:1px solid var(--line-strong);color:var(--dim);padding:2px 8px;border-radius:var(--r-pill)}
  .node.hi .tag{background:var(--accent);color:#fff;border-color:transparent}
  .link{display:flex;align-items:center;color:var(--faint);font-family:var(--mono);font-size:18px}

  /* Two columns (choix/limites) */
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:clamp(20px,2.6vw,44px);flex:1;min-height:0;align-content:center}
  .col h3{display:flex;align-items:center;gap:10px;font-size:17px;margin-bottom:18px;font-family:var(--mono);letter-spacing:.04em}
  .col.ok h3{color:var(--ok)}.col.warn h3{color:var(--warn)}
  .col ul{list-style:none;display:flex;flex-direction:column;gap:12px}
  .col li{display:flex;gap:11px;font-size:15px;line-height:1.4;color:var(--dim)}
  .col li::before{content:"";flex:0 0 auto;width:7px;height:7px;margin-top:6px;border-radius:2px}
  .col.ok li::before{background:var(--ok)}.col.warn li::before{background:var(--warn)}
  .col li b{color:var(--text);font-weight:600}

  /* Closing */
  .close-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:26px}
  .done{display:flex;gap:11px;align-items:flex-start;font-size:15px;line-height:1.4}
  .done::before{content:"✓";color:var(--ok);font-weight:800;margin-top:1px}
  .done b{font-weight:600}

  /* Cahier des charges (exigences -> preuve) — inspiré du deck P2 */
  .reqs{display:flex;flex-direction:column;gap:12px;margin-top:24px}
  .scroll{overflow-y:auto;min-height:0}
  .scroll::-webkit-scrollbar{width:8px}.scroll::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:8px}
  .req{border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:var(--r-sm);padding:14px 18px;background:var(--bg-1)}
  .req .w{display:flex;gap:10px;align-items:baseline;font-size:clamp(14px,1.15vw,17px);font-weight:700}
  .req .w .tick{color:var(--ok);font-weight:800}
  .req .w .tag{margin-left:auto;font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);border:1px solid var(--line);padding:2px 8px;border-radius:var(--r-pill)}
  .req .g{color:var(--dim);font-size:14px;margin-top:7px;line-height:1.5}
  .req .g code{font-family:var(--mono);color:var(--accent-2)}

  /* Editor / code (preuve technique du format ouvert) */
  .editor{border:1px solid var(--line-strong);border-radius:var(--r-md);overflow:hidden;background:var(--inset);box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .etop{display:flex;align-items:center;background:var(--bg-2);border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12px}
  .etop .edots{display:flex;gap:6px;padding:0 14px}
  .etop .edots i{width:11px;height:11px;border-radius:50%;display:block;background:#2b313b}
  .etop .edots i:nth-child(1){background:#ff5f57}.etop .edots i:nth-child(2){background:#febc2e}.etop .edots i:nth-child(3){background:#28c840}
  .etab{padding:9px 15px;color:var(--text);border-left:1px solid var(--line);border-bottom:2px solid var(--accent)}
  .code{font-family:var(--mono);font-size:clamp(11.5px,1vw,14px);line-height:1.7;padding:18px 22px;white-space:pre;overflow:auto;color:#c6cdd7;tab-size:2}
  .code .k{color:var(--accent-2)}.code .s{color:var(--ok)}.code .c{color:var(--faint);font-style:italic}.code .n{color:var(--warn)}

  /* Bonus — grille "bento" (design volontairement different du P2) */
  .bento{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:26px}
  .bento .b{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:var(--r-md);
    padding:20px 20px 18px;background:linear-gradient(180deg,var(--bg-2),var(--bg-1))}
  .bento .b::after{content:"";position:absolute;left:0;top:0;right:0;height:2px;
    background:linear-gradient(90deg,var(--accent),transparent 70%)}
  .bento .b.wide{grid-column:span 2;background:linear-gradient(120deg,var(--accent-soft),var(--bg-1) 60%);border-color:var(--accent-line)}
  .bento .b .plus{position:absolute;top:13px;right:15px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--accent-2);opacity:.8}
  .bento .b .t{font-weight:800;font-size:16px;margin-bottom:6px;letter-spacing:-.01em}
  .bento .b.wide .t{font-size:20px}
  .bento .b .s{color:var(--dim);font-size:13.5px;line-height:1.45}
  .bento .b .s b{color:var(--text);font-weight:600}
  @media (max-width:900px){.bento{grid-template-columns:1fr}.bento .b.wide{grid-column:auto}}

  .hint{position:fixed;z-index:20;top:18px;right:clamp(20px,3vw,42px);font-family:var(--mono);font-size:11px;
    color:var(--faint);opacity:0;transition:opacity .4s}
  body:hover .hint{opacity:.7}
  kbd{font-family:var(--mono);border:1px solid var(--line-strong);border-radius:5px;padding:1px 6px;color:var(--dim);font-size:10.5px}

  /* ===== Entrée en cascade du contenu (quand la slide devient active) ===== */
  @media (prefers-reduced-motion:no-preference){
    @keyframes rise{from{opacity:0;transform:translateY(13px)}to{opacity:1;transform:none}}
    @keyframes pop{from{opacity:0;transform:translateY(7px) scale(.95)}to{opacity:1;transform:none}}
    .slide.active .kicker{animation:rise .5s .05s both cubic-bezier(.16,1,.3,1)}
    .slide.active h1,.slide.active h2{animation:rise .55s .12s both cubic-bezier(.16,1,.3,1)}
    .slide.active .lede{animation:rise .55s .20s both cubic-bezier(.16,1,.3,1)}
    .slide.active .frame,.slide.active .card,.slide.active .node,.slide.active .col,.slide.active .arrow{animation:rise .6s .16s both cubic-bezier(.16,1,.3,1)}
    /* léger décalage entre les colonnes/cartes côte à côte */
    .slide.active .ba .card.good{animation-delay:.28s}
    .slide.active .arch .node:nth-child(3){animation-delay:.26s}
    .slide.active .arch .node:nth-child(5){animation-delay:.36s}
    .slide.active .cols .col.warn{animation-delay:.26s}
    /* puces : cascade */
    .slide.active ul.feat li{animation:rise .5s both cubic-bezier(.16,1,.3,1)}
    .slide.active ul.feat li:nth-child(1){animation-delay:.26s}
    .slide.active ul.feat li:nth-child(2){animation-delay:.34s}
    .slide.active ul.feat li:nth-child(3){animation-delay:.42s}
    .slide.active ul.feat li:nth-child(4){animation-delay:.50s}
    .slide.active ul.feat li:nth-child(5){animation-delay:.58s}
    .slide.active ul.feat li:nth-child(6){animation-delay:.66s}
    .slide.active ul.feat li:nth-child(7){animation-delay:.74s}
    /* chips : pop en cascade */
    .slide.active .chips .chip{animation:pop .42s both cubic-bezier(.16,1,.3,1)}
    .slide.active .chips .chip:nth-child(1){animation-delay:.30s}
    .slide.active .chips .chip:nth-child(2){animation-delay:.36s}
    .slide.active .chips .chip:nth-child(3){animation-delay:.42s}
    .slide.active .chips .chip:nth-child(4){animation-delay:.48s}
    .slide.active .chips .chip:nth-child(5){animation-delay:.54s}
    .slide.active .chips .chip:nth-child(6){animation-delay:.60s}
    .slide.active .chips .chip:nth-child(7){animation-delay:.66s}
    /* callouts : apparaissent après la capture */
    .slide.active .callout{animation:pop .5s .55s both cubic-bezier(.16,1,.3,1)}
    /* la timeline de progression pulse discrètement à chaque changement */
  }

  /* ===== Vie : entree en cascade + respiration du fond (signature P1 : "focus" facon lecteur) ===== */
  @media (prefers-reduced-motion:no-preference){
    @keyframes p1drift{from{transform:translate3d(-2%,-1%,0) scale(1)}to{transform:translate3d(3%,2%,0) scale(1.05)}}
    @keyframes p1rise{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}
    @keyframes p1focus{from{opacity:0;transform:translateY(10px) scale(.985);filter:blur(4px)}to{opacity:1;transform:none;filter:blur(0)}}
    body::before{animation:p1drift 26s ease-in-out infinite alternate}
    .slide.active .kicker{animation:p1rise .5s .04s both var(--ease)}
    .slide.active h1,.slide.active h2{animation:p1rise .55s .10s both var(--ease)}
    .slide.active .lede{animation:p1rise .55s .18s both var(--ease)}
    /* les captures "font le point" comme un lecteur video */
    .slide.active .frame,.slide.active .editor{animation:p1focus .6s .16s both var(--ease)}
    .slide.active .callout{animation:p1rise .5s both var(--ease)}
    .slide.active .callout:nth-of-type(1){animation-delay:.42s}
    .slide.active .callout:nth-of-type(2){animation-delay:.52s}
    .slide.active .callout:nth-of-type(3){animation-delay:.62s}
    .slide.active ul.feat li{animation:p1rise .5s both var(--ease)}
    .slide.active ul.feat li:nth-child(1){animation-delay:.24s}
    .slide.active ul.feat li:nth-child(2){animation-delay:.32s}
    .slide.active ul.feat li:nth-child(3){animation-delay:.40s}
    .slide.active ul.feat li:nth-child(4){animation-delay:.48s}
    .slide.active ul.feat li:nth-child(5){animation-delay:.56s}
    .slide.active .req{animation:p1rise .5s both var(--ease)}
    .slide.active .req:nth-child(1){animation-delay:.14s}
    .slide.active .req:nth-child(2){animation-delay:.24s}
    .slide.active .req:nth-child(3){animation-delay:.34s}
    .slide.active .req:nth-child(4){animation-delay:.44s}
    .slide.active .req:nth-child(5){animation-delay:.54s}
    .slide.active .req:nth-child(6){animation-delay:.64s}
    .slide.active .bento .b{animation:p1focus .55s both var(--ease)}
    .slide.active .bento .b:nth-child(1){animation-delay:.14s}
    .slide.active .bento .b:nth-child(2){animation-delay:.22s}
    .slide.active .bento .b:nth-child(3){animation-delay:.30s}
    .slide.active .bento .b:nth-child(4){animation-delay:.38s}
    .slide.active .bento .b:nth-child(5){animation-delay:.46s}
    .slide.active .bento .b:nth-child(6){animation-delay:.54s}
    .slide.active .ba .card{animation:p1rise .55s both var(--ease)}
    .slide.active .ba .card.good{animation-delay:.18s}

        <li><b>JWT front</b> — décodé pour l'affichage seul (contrôle réel = Core)</li>
      </ul>
    </div>
  </div>
  <p class="lede" style="margin-top:28px">Prochaines étapes : promotion auto du présentateur, avance image par image, hotspots de rétention (P3-B) sur la timeline.</p>
</section>`,

];

/* ============ Moteur du deck ============ */
const deck = document.getElementById('deck');
deck.innerHTML = slides.join('');
const els = [...deck.querySelectorAll('.slide')];
const dots = document.getElementById('dots');
const bar = document.getElementById('bar');
const counter = document.getElementById('counter');
let i = 0;
const pad = n => String(n).padStart(2,'0');

els.forEach((_,n)=>{const b=document.createElement('button');b.onclick=()=>go(n);dots.appendChild(b);});
const dotEls=[...dots.children];

function go(n){
  i=Math.max(0,Math.min(els.length-1,n));
  els.forEach((s,k)=>{s.classList.toggle('active',k===i);s.classList.toggle('past',k<i);});
  dotEls.forEach((d,k)=>d.classList.toggle('on',k===i));
  bar.style.width=((i+1)/els.length*100)+'%';
  counter.innerHTML=`<b>${pad(i+1)}</b> / ${pad(els.length)}`;
  location.hash=i+1;
}
function next(){go(i+1);} function prev(){go(i-1);}

addEventListener('keydown',e=>{
  if(['ArrowRight','ArrowDown',' ','PageDown','Enter'].includes(e.key)){e.preventDefault();next();}
  else if(['ArrowLeft','ArrowUp','PageUp','Backspace'].includes(e.key)){e.preventDefault();prev();}
  else if(e.key==='Home'){go(0);} else if(e.key==='End'){go(els.length-1);}
  else if(e.key==='f'||e.key==='F'){ if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen(); }
  else if(/^[1-9]$/.test(e.key)){go(parseInt(e.key)-1);}
});
addEventListener('click',e=>{ if(e.target.closest('#dots,.hint,#brand-hud'))return;
  const x=e.clientX/innerWidth; if(x>0.62)next(); else if(x<0.20)prev(); });

const start=parseInt(location.hash.slice(1)); go(Number.isFinite(start)&&start?start-1:0);
</script>
