<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Poulpium — Soutenance P1 (Frontend)</title>
<style>
  /* ===== Design system Poulpium (dark studio) ===== */
  :root{
    --bg:#0a0c0f; --bg-1:#101319; --bg-2:#161a21; --bg-3:#1d222b; --inset:#07090c;
    --line:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.14);
    --text:#e9ebef; --dim:#9aa2ae; --faint:#5d646f;
    --accent:#3d6dfd; --accent-2:#5b85ff; --accent-soft:rgba(61,109,253,.15); --accent-line:rgba(61,109,253,.45);
    --ok:#2ec27e; --warn:#f5a623; --danger:#ff5b5b;
    --amber:#f5a623; --cyan:#29c5e6; --violet:#b07bff;
    --r-sm:8px; --r-md:14px; --r-lg:22px; --r-pill:999px;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"SFMono-Regular","JetBrains Mono","Cascadia Code",Consolas,Menlo,monospace;
    color-scheme:dark;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--text);font-family:var(--sans);
    overflow:hidden;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;
  }
  /* atmosphère */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(900px 600px at 12% -8%, rgba(61,109,253,.16), transparent 60%),
      radial-gradient(760px 520px at 100% 110%, rgba(41,197,230,.10), transparent 55%);
  }

  /* ===== Deck ===== */
  #deck{position:fixed;inset:0;z-index:1}
  .slide{
    position:absolute;inset:0;display:flex;flex-direction:column;
    padding:clamp(28px,5vw,84px);
    opacity:0;visibility:hidden;transform:translateY(14px) scale(.995);
    transition:opacity .5s var(--ease,cubic-bezier(.16,1,.3,1)),transform .5s var(--ease,cubic-bezier(.16,1,.3,1)),visibility .5s;
  }
  .slide.active{opacity:1;visibility:visible;transform:none}
  .slide.past{transform:translateY(-14px) scale(.995)}

  /* HUD */
  #hud{position:fixed;z-index:20;left:0;right:0;bottom:0;height:4px;background:rgba(255,255,255,.05)}
  #bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .5s var(--ease,ease)}
  #counter{position:fixed;z-index:20;right:clamp(20px,3vw,42px);bottom:20px;
    font-family:var(--mono);font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums;letter-spacing:.08em}
  #counter b{color:var(--text)}
  #dots{position:fixed;z-index:20;left:50%;transform:translateX(-50%);bottom:18px;display:flex;gap:7px}
  #dots button{width:7px;height:7px;border-radius:50%;border:0;background:rgba(255,255,255,.18);cursor:pointer;padding:0;transition:all .3s}
  #dots button.on{background:var(--accent);width:22px;border-radius:6px}
  #brand-hud{position:fixed;z-index:20;left:clamp(20px,3vw,42px);bottom:16px;display:flex;align-items:center;gap:8px;opacity:.6}
  #brand-hud img{width:16px;height:16px}
  #brand-hud span{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--faint);text-transform:uppercase}

  /* Building blocks */
  .kicker{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:13px;
    text-transform:uppercase;letter-spacing:.16em;color:var(--accent-2);margin-bottom:18px}
  .kicker::before{content:"";width:26px;height:2px;background:var(--accent);border-radius:2px}
  h1{font-size:clamp(34px,4.6vw,64px);line-height:1.02;font-weight:800;letter-spacing:-.03em}
  h2{font-size:clamp(26px,3.4vw,46px);line-height:1.05;font-weight:800;letter-spacing:-.025em}
  .lede{font-size:clamp(15px,1.4vw,20px);color:var(--dim);line-height:1.5;max-width:60ch;margin-top:16px;font-weight:400}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums}

  /* Browser frame mockup */
  .frame{border:1px solid var(--line-strong);border-radius:var(--r-lg);overflow:hidden;
    background:var(--bg-1);box-shadow:0 30px 80px rgba(0,0,0,.55),0 2px 0 rgba(255,255,255,.03) inset}
  .frame-bar{display:flex;align-items:center;gap:7px;padding:11px 14px;background:var(--bg-2);border-bottom:1px solid var(--line)}
  .frame-bar i{width:11px;height:11px;border-radius:50%;background:#2b313b;display:block}
  .frame-bar i:nth-child(1){background:#ff5f57}.frame-bar i:nth-child(2){background:#febc2e}.frame-bar i:nth-child(3){background:#28c840}
  .frame-bar .url{margin-left:12px;font-family:var(--mono);font-size:12px;color:var(--faint);
    background:var(--inset);padding:5px 12px;border-radius:var(--r-pill);border:1px solid var(--line)}
  .frame img{display:block;width:100%;height:auto}

  /* Layout helpers */
  .split{display:grid;grid-template-columns:1fr 1.25fr;gap:clamp(24px,3.4vw,64px);align-items:center;flex:1;min-height:0}
  .split.rev{grid-template-columns:1.25fr 1fr}
  .split .txt{min-width:0}
  .split .media{min-width:0}
  .center{flex:1;display:flex;flex-direction:column;justify-content:center}

  ul.feat{list-style:none;margin-top:26px;display:flex;flex-direction:column;gap:15px}
  ul.feat li{display:flex;gap:13px;align-items:flex-start;font-size:clamp(14px,1.15vw,17px);line-height:1.4}
  ul.feat li::before{content:"";flex:0 0 auto;width:8px;height:8px;margin-top:7px;border-radius:2px;
    background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  ul.feat li b{color:var(--text);font-weight:700}
  ul.feat li span{color:var(--dim)}

  .chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px}
  .chip{font-family:var(--mono);font-size:12.5px;color:var(--text);background:var(--bg-2);
    border:1px solid var(--line-strong);padding:8px 13px;border-radius:var(--r-pill);display:inline-flex;gap:8px;align-items:center}
  .chip .d{width:9px;height:9px;border-radius:50%}

  /* Cover */
  .cover{align-items:flex-start;justify-content:center}
  .cover .logo{display:flex;align-items:center;gap:18px;margin-bottom:34px}
  .cover .logo img{width:64px;height:64px;filter:drop-shadow(0 8px 24px rgba(61,109,253,.5))}
  .cover .logo .word{font-size:clamp(38px,5vw,72px);font-weight:800;letter-spacing:-.03em;
    background:linear-gradient(90deg,#cdd6ff,var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .cover .meta{margin-top:38px;display:flex;flex-direction:column;gap:7px}
  .cover .meta .row{display:flex;gap:12px;align-items:center;font-size:15px;color:var(--dim)}
  .cover .meta .row .tag{font-family:var(--mono);font-size:12px;color:var(--accent-2);
    border:1px solid var(--accent-line);background:var(--accent-soft);padding:3px 10px;border-radius:var(--r-pill)}
  .cover .team{margin-top:6px;font-family:var(--mono);font-size:13px;color:var(--faint);letter-spacing:.04em}

  /* Before/After */
  .ba{display:grid;grid-template-columns:1fr auto 1fr;gap:clamp(18px,2.6vw,44px);align-items:stretch;flex:1;min-height:0}
  .card{border:1px solid var(--line);border-radius:var(--r-md);padding:clamp(22px,2.6vw,38px);display:flex;flex-direction:column;justify-content:center}
  .card.bad{background:linear-gradient(180deg,rgba(255,91,91,.06),transparent);border-color:rgba(255,91,91,.28)}
  .card.good{background:linear-gradient(180deg,var(--accent-soft),transparent);border-color:var(--accent-line)}
  .card .tag{font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.14em;margin-bottom:16px}
  .card.bad .tag{color:var(--danger)}.card.good .tag{color:var(--accent-2)}
  .card .big{font-size:clamp(19px,2vw,26px);font-weight:700;line-height:1.25}
  .card .sub{color:var(--dim);margin-top:12px;font-size:15px;line-height:1.5}
  .card .mail{font-family:var(--mono);font-size:13px;color:var(--dim);background:var(--inset);
    border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 14px;margin-top:16px;line-height:1.5}
  .arrow{display:flex;align-items:center;color:var(--faint);font-size:30px}

  /* Callouts on hero */
  .callout-wrap{position:relative}
  .callout{position:absolute;font-family:var(--mono);font-size:12px;color:var(--text);
    background:rgba(16,19,25,.92);border:1px solid var(--accent-line);padding:7px 11px;border-radius:var(--r-pill);
    box-shadow:0 8px 24px rgba(0,0,0,.5);backdrop-filter:blur(4px);white-space:nowrap}
  .callout .d{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle}

  /* Architecture */
  .arch{display:flex;gap:16px;align-items:stretch;margin-top:12px}
  .node{flex:1;border:1px solid var(--line-strong);border-radius:var(--r-md);padding:22px;background:var(--bg-1);position:relative}
  .node.hi{border-color:var(--accent-line);background:linear-gradient(180deg,var(--accent-soft),var(--bg-1))}
  .node .t{font-weight:800;font-size:18px;margin-bottom:6px}
  .node .s{color:var(--dim);font-size:13.5px;line-height:1.45}
  .node .tag{position:absolute;top:-10px;left:20px;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;
    text-transform:uppercase;background:var(--bg-3);border:1px solid var(--line-strong);color:var(--dim);padding:2px 8px;border-radius:var(--r-pill)}
  .node.hi .tag{background:var(--accent);color:#fff;border-color:transparent}
  .link{display:flex;align-items:center;color:var(--faint);font-family:var(--mono);font-size:18px}

  /* Two columns (choix/limites) */
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:clamp(20px,2.6vw,44px);flex:1;min-height:0;align-content:center}
  .col h3{display:flex;align-items:center;gap:10px;font-size:17px;margin-bottom:18px;font-family:var(--mono);letter-spacing:.04em}
  .col.ok h3{color:var(--ok)}.col.warn h3{color:var(--warn)}
  .col ul{list-style:none;display:flex;flex-direction:column;gap:12px}
  .col li{display:flex;gap:11px;font-size:15px;line-height:1.4;color:var(--dim)}
  .col li::before{content:"";flex:0 0 auto;width:7px;height:7px;margin-top:6px;border-radius:2px}
  .col.ok li::before{background:var(--ok)}.col.warn li::before{background:var(--warn)}
  .col li b{color:var(--text);font-weight:600}

  /* Closing */
  .close-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:26px}
  .done{display:flex;gap:11px;align-items:flex-start;font-size:15px;line-height:1.4}
  .done::before{content:"✓";color:var(--ok);font-weight:800;margin-top:1px}
  .done b{font-weight:600}

  .hint{position:fixed;z-index:20;top:18px;right:clamp(20px,3vw,42px);font-family:var(--mono);font-size:11px;
    color:var(--faint);opacity:0;transition:opacity .4s}
  body:hover .hint{opacity:.7}
  kbd{font-family:var(--mono);border:1px solid var(--line-strong);border-radius:5px;padding:1px 6px;color:var(--dim);font-size:10.5px}

  @media (max-width:900px){
    .split,.split.rev,.ba,.cols,.close-grid,.arch{grid-template-columns:1fr;display:flex;flex-direction:column}
    .arrow{transform:rotate(90deg)}
  }
  @media (prefers-reduced-motion:reduce){
    .slide{transition:opacity .001s}*{scroll-behavior:auto}
  }
</style>
</head>
<body>

<div class="hint">← → naviguer · <kbd>F</kbd> plein écran</div>
<div id="deck"></div>

<div id="hud"><div id="bar"></div></div>
<div id="dots"></div>
<div id="counter"><b>01</b> / 11</div>
<div id="brand-hud"><img src="assets/poulpium-mark.png" alt=""><span>Poulpium · Pôle 1</span></div>

<script>
/* ============ Contenu des slides ============ */
const slides = [

/* 1 — COVER */
`<section class="slide cover center">
  <div>
    <div class="logo">
      <img src="assets/poulpium-mark.png" alt="Poulpium">
      <span class="word">Poulpium</span>
    </div>
    <div class="kicker">Pôle 1 · Application & Collaboration</div>
    <h1>La revue vidéo<br>collaborative, à la<br>seconde près.</h1>
    <p class="lede">Dessiner sur l'image, commenter un instant précis, à plusieurs et en direct. Plusieurs bras sur une même vidéo.</p>
    <div class="meta">
      <div class="row"><span class="tag">Sujet A</span> Lecteur de Revue augmenté</div>
      <div class="row"><span class="tag">Sujet B</span> Watch Together (visionnage synchronisé)</div>
    </div>
    <div class="team">Hackathon ESTIAM — Groupe 7   ·   Équipe P1 : Alex · Matthieu · Amos</div>
  </div>
</section>`,

/* 2 — PROBLEME / REPONSE */
`<section class="slide">
  <div class="kicker">Le problème</div>
  <h2>Un retour vidéo par e-mail, c'est illisible.</h2>
  <div class="ba" style="margin-top:34px">
    <div class="card bad">
      <div class="tag">Avant</div>
      <div class="big">Décrire un instant avec des mots.</div>
      <div class="mail">« À 1:32, le logo en haut à droite est trop petit… enfin je crois, c'est celui juste après la transition. »</div>
      <div class="sub">Imprécis, fastidieux, source d'allers-retours et de malentendus.</div>
    </div>
    <div class="arrow">→</div>
    <div class="card good">
      <div class="tag">Avec Poulpium</div>
      <div class="big">Montrer, exactement, sur l'image.</div>
      <div class="sub">On met en pause, on dessine une flèche sur le logo, on écrit le commentaire. Il est <b>épinglé au timecode</b> et partagé en direct. Un clic y ramène tout le monde.</div>
    </div>
  </div>
</section>`,

/* 3 — HERO : Poulpium en un écran */
`<section class="slide">
  <div class="split rev">
    <div class="media callout-wrap">
      <div class="frame">
        <div class="frame-bar"><i></i><i></i><i></i><span class="url">poulpium.app / review / pokedex</span></div>
        <img src="assets/03-revue-annotation.png" alt="Écran de revue Poulpium">
      </div>
      <div class="callout" style="top:12%;left:40%"><span class="d" style="background:var(--cyan)"></span>Cadre au timecode</div>
      <div class="callout" style="top:44%;left:2%"><span class="d" style="background:var(--amber)"></span>Flèche épinglée à 1:44</div>
      <div class="callout" style="top:20%;right:-2%"><span class="d" style="background:var(--accent)"></span>Fil de commentaires</div>
    </div>
    <div class="txt">
      <div class="kicker">Le produit</div>
      <h2>Tout se passe sur un seul écran.</h2>
      <ul class="feat">
        <li><b>Le lecteur</b><span> — vidéo, timeline à marqueurs, contrôles.</span></li>
        <li><b>Le calque d'annotation</b><span> — on dessine directement sur l'image.</span></li>
        <li><b>Le fil de commentaires</b><span> — trié par instant, à droite.</span></li>
        <li><b>La présence live</b><span> — qui regarde, où, en temps réel.</span></li>
      </ul>
    </div>
  </div>
</section>`,

/* 4 — SUJET A : annotation */
`<section class="slide">
  <div class="split">
    <div class="txt">
      <div class="kicker">Sujet A · Lecteur de Revue augmenté</div>
      <h2>Annoter un instant précis.</h2>
      <p class="lede">Chaque tracé est rattaché à la seconde exacte de la vidéo et met la lecture en pause.</p>
      <div class="chips">
        <span class="chip">Curseur</span><span class="chip">Trait libre</span><span class="chip">Flèche</span>
        <span class="chip">Cadre</span><span class="chip">Ellipse</span><span class="chip">Texte</span><span class="chip">Gomme</span>
      </div>
      <div class="chips">
        <span class="chip"><span class="d" style="background:#f5a623"></span>Ambre</span>
        <span class="chip"><span class="d" style="background:#ff5b5b"></span>Rouge</span>
        <span class="chip"><span class="d" style="background:#2ec27e"></span>Vert</span>
        <span class="chip"><span class="d" style="background:#29c5e6"></span>Cyan</span>
        <span class="chip"><span class="d" style="background:#b07bff"></span>Violet</span>
        <span class="chip"><span class="d" style="background:#f4f6fa"></span>Blanc</span>
      </div>
      <ul class="feat" style="margin-top:22px">
        <li><b>Coordonnées normalisées 0..1</b><span> — le dessin s'adapte à toute taille d'écran et se mappe entre fenêtres.</span></li>
        <li><b>Canevas net (Retina)</b><span> — DPR-aware, redessiné au redimensionnement.</span></li>
      </ul>
    </div>
    <div class="media">
      <div class="frame">
        <div class="frame-bar"><i></i><i></i><i></i><span class="url">annotation · timecode 2:41</span></div>
        <img src="assets/04-annotation-b.png" alt="Annotation au timecode">
      </div>
    </div>
  </div>
</section>`,

/* 5 — COMMENTAIRES + TEMPS REEL */
`<section class="slide">
  <div class="split rev">
    <div class="media">
      <div class="frame">
        <div class="frame-bar"><i></i><i></i><i></i><span class="url">fil de revue · trié par instant</span></div>
        <img src="assets/05-comments.png" alt="Commentaires">
      </div>
    </div>
    <div class="txt">
      <div class="kicker">Commentaires & temps réel</div>
      <h2>Un fil de revue, vivant.</h2>
      <ul class="feat">
        <li><b>Trié par instant</b><span> — un clic ramène tout le monde au bon timecode.</span></li>
        <li><b>Fils & statuts</b><span> — réponses, résolu / non résolu, likes, filtres.</span></li>
        <li><b>Diffusion live</b><span> — présence, curseurs distants, notes propagées.</span></li>
        <li><b>Transport abstrait</b><span> — même contrat : multi-fenêtres (offline) ou LAN (socket.io).</span></li>
      </ul>
    </div>
  </div>
</section>`,

/* 6 — SUJET B : Watch Together */
`<section class="slide center">
  <div class="kicker">Sujet B · Watch Together</div>
  <h2 style="max-width:20ch">Un présentateur, des invités synchronisés.</h2>
  <div class="arch" style="margin-top:40px;max-width:1100px">
    <div class="node hi"><span class="tag">Présentateur</span><div class="t">Prend la main</div><div class="s">Ses play / pause / seek pilotent la session. « Vous présentez ».</div></div>
    <div class="link">))) →</div>
    <div class="node"><span class="tag">Invités</span><div class="t">Contrôles verrouillés</div><div class="s">La lecture suit le présentateur, à l'image près.</div></div>
    <div class="link">↺</div>
    <div class="node"><span class="tag">Robustesse</span><div class="t">Anti-dérive</div><div class="s">Retardataire resynchronisé, recalage si écart &gt; 0,4 s, anti-écho.</div></div>
  </div>
  <div style="max-width:940px;margin:30px auto 0;text-align:center">
    <div style="border:1px solid var(--line-strong);border-radius:var(--r-md);overflow:hidden;background:var(--bg-2);box-shadow:0 16px 40px rgba(0,0,0,.45)">
      <img src="assets/06-presenter.png" alt="Barre du lecteur — bouton présentateur" style="display:block;width:210%">
    </div>
    <div style="font-family:var(--mono);font-size:12px;color:var(--faint);margin-top:10px;letter-spacing:.04em">Dans la barre du lecteur : « Vous présentez · Arrêter » passe en accent quand vous pilotez la session</div>
  </div>
  <p class="lede" style="margin-top:24px;max-width:70ch">Un retardataire qui arrive en cours de route est <b style="color:var(--text)">recalé automatiquement</b>. Tout passe par le même bus temps réel que les annotations.</p>
</section>`,

/* 7 — SECURITE (P2) */
`<section class="slide">
  <div class="split">
    <div class="txt">
      <div class="kicker">Intégration Pôle 2 · Zero-Trust</div>
      <h2>La sécurité, intégrée au lecteur.</h2>
      <p class="lede">La vidéo « pokedex » n'est pas un fichier local : c'est un <b style="color:var(--text)">flux HLS chiffré</b>, servi par le Core.</p>
      <ul class="feat" style="margin-top:22px">
        <li><b>Clé à la demande</b><span> — le token JWT est joint à la requête de clé ; sans droit, refus (401 / 403).</span></li>
        <li><b>Watermark de session</b><span> — pseudo + horodatage incrustés (visible en filigrane), dissuasif et traçable.</span></li>
        <li><b>Récupération</b><span> — erreurs média rejouées, messages clairs si la source est illisible.</span></li>
      </ul>
    </div>
    <div class="media callout-wrap">
      <div class="frame">
        <div class="frame-bar"><i></i><i></i><i></i><span class="url">https · flux HLS chiffré (AES-128)</span></div>
        <img src="assets/07-watermark.png" alt="Flux protégé + watermark">
      </div>
      <div class="callout" style="bottom:22%;left:6%"><span class="d" style="background:var(--warn)"></span>Watermark « alice · … » en filigrane</div>
    </div>
  </div>
</section>`,

/* 8 — BACK-OFFICE / MULTI-TENANT */
`<section class="slide">
  <div class="split rev">
    <div class="media callout-wrap">
      <div class="frame">
        <div class="frame-bar"><i></i><i></i><i></i><span class="url">poulpium.app / admin / contenus</span></div>

/* ============ Moteur du deck ============ */
const deck = document.getElementById('deck');
deck.innerHTML = slides.join('');
const els = [...deck.querySelectorAll('.slide')];
const dots = document.getElementById('dots');
const bar = document.getElementById('bar');
const counter = document.getElementById('counter');
let i = 0;
const pad = n => String(n).padStart(2,'0');

els.forEach((_,n)=>{const b=document.createElement('button');b.onclick=()=>go(n);dots.appendChild(b);});
const dotEls=[...dots.children];

function go(n){
  i=Math.max(0,Math.min(els.length-1,n));
  els.forEach((s,k)=>{s.classList.toggle('active',k===i);s.classList.toggle('past',k<i);});
  dotEls.forEach((d,k)=>d.classList.toggle('on',k===i));
  bar.style.width=((i+1)/els.length*100)+'%';
  counter.innerHTML=`<b>${pad(i+1)}</b> / ${pad(els.length)}`;
  location.hash=i+1;
}
function next(){go(i+1);} function prev(){go(i-1);}

addEventListener('keydown',e=>{
  if(['ArrowRight','ArrowDown',' ','PageDown','Enter'].includes(e.key)){e.preventDefault();next();}
  else if(['ArrowLeft','ArrowUp','PageUp','Backspace'].includes(e.key)){e.preventDefault();prev();}
  else if(e.key==='Home'){go(0);} else if(e.key==='End'){go(els.length-1);}
  else if(e.key==='f'||e.key==='F'){ if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen(); }
  else if(/^[1-9]$/.test(e.key)){go(parseInt(e.key)-1);}
});
addEventListener('click',e=>{ if(e.target.closest('#dots,.hint,#brand-hud'))return;
  const x=e.clientX/innerWidth; if(x>0.62)next(); else if(x<0.20)prev(); });

const start=parseInt(location.hash.slice(1)); go(Number.isFinite(start)&&start?start-1:0);
</script>
