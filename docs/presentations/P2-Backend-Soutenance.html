<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Poulpium — Soutenance P2 (Backend)</title>
<style>
  /* ===== Palette Poulpium (identique) — mais mise en scène "IDE/terminal" ===== */
  :root{
    --bg:#090b0f; --bg-1:#0d1016; --bg-2:#12151c; --bg-3:#1b1f28; --inset:#06080b; --editor:#0a0d12;
    --line:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.14);
    --text:#e9ebef; --dim:#9aa2ae; --faint:#5d646f;
    --accent:#3d6dfd; --accent-2:#5b85ff; --accent-soft:rgba(61,109,253,.15); --accent-line:rgba(61,109,253,.45);
    --ok:#2ec27e; --warn:#f5a623; --danger:#ff5b5b; --violet:#b07bff; --cyan:#29c5e6;
    --r-sm:7px; --r-md:12px; --r-lg:18px; --r-pill:999px;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"SFMono-Regular","JetBrains Mono","Cascadia Code",Consolas,Menlo,monospace;
    color-scheme:dark;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
  /* fond : grille technique discrète (différent du P1) */
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
    background:
      linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px) 0 0/100% 34px,
      linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px) 0 0/34px 100%,
      radial-gradient(800px 520px at 88% -6%, rgba(61,109,253,.12), transparent 60%)}

  #deck{position:fixed;inset:0;z-index:1}
  .slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;
    padding:clamp(26px,4.4vw,76px);opacity:0;visibility:hidden;transform:translateY(12px);
    transition:opacity .45s cubic-bezier(.16,1,.3,1),transform .45s cubic-bezier(.16,1,.3,1),visibility .45s}
  .slide.active{opacity:1;visibility:visible;transform:none}

  /* HUD */
  #hud{position:fixed;z-index:20;left:0;right:0;bottom:0;height:3px;background:rgba(255,255,255,.05)}
  #bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--cyan));transition:width .45s ease}
  #counter{position:fixed;z-index:20;right:clamp(18px,3vw,40px);bottom:16px;font-family:var(--mono);font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums;letter-spacing:.08em}
  #counter b{color:var(--text)}
  #dots{position:fixed;z-index:20;left:50%;transform:translateX(-50%);bottom:14px;display:flex;gap:7px}
  #dots button{width:7px;height:7px;border-radius:2px;border:0;background:rgba(255,255,255,.18);cursor:pointer;padding:0;transition:all .3s}
  #dots button.on{background:var(--accent);width:20px}
  #brand-hud{position:fixed;z-index:20;left:clamp(18px,3vw,40px);bottom:13px;display:flex;align-items:center;gap:8px;opacity:.6}
  #brand-hud img{width:15px;height:15px}
  #brand-hud span{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--faint);text-transform:uppercase}

  /* Typo */
  .kicker{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12.5px;text-transform:uppercase;letter-spacing:.15em;color:var(--accent-2);margin-bottom:16px}
  .kicker::before{content:"›";color:var(--accent);font-weight:800}
  h1{font-size:clamp(32px,4.4vw,60px);line-height:1.03;font-weight:800;letter-spacing:-.03em}
  h2{font-size:clamp(24px,3.2vw,42px);line-height:1.06;font-weight:800;letter-spacing:-.025em}
  .lede{font-size:clamp(14px,1.35vw,19px);color:var(--dim);line-height:1.5;max-width:64ch;margin-top:14px}
  .num,.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .scroll{overflow-y:auto;min-height:0}
  .scroll::-webkit-scrollbar{width:8px}.scroll::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:8px}

  /* ===== Editor / code ===== */
  .editor{border:1px solid var(--line-strong);border-radius:var(--r-md);overflow:hidden;background:var(--editor);box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .etop{display:flex;align-items:center;background:var(--bg-2);border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12px}
  .etop .dots{display:flex;gap:6px;padding:0 14px}
  .etop .dots i{width:11px;height:11px;border-radius:50%;display:block;background:#2b313b}
  .etop .dots i:nth-child(1){background:#ff5f57}.etop .dots i:nth-child(2){background:#febc2e}.etop .dots i:nth-child(3){background:#28c840}
  .etab{padding:9px 15px;color:var(--faint);border-left:1px solid var(--line)}
  .etab.on{color:var(--text);background:var(--editor);border-bottom:2px solid var(--accent)}
  .code{font-family:var(--mono);font-size:clamp(11.5px,1vw,14.5px);line-height:1.75;padding:18px 22px;white-space:pre;overflow:auto;color:#c6cdd7;tab-size:2}
  .code .k{color:var(--accent-2)}.code .s{color:var(--ok)}.code .w{color:var(--warn)}.code .r{color:var(--danger)}.code .c{color:var(--faint);font-style:italic}.code .f{color:var(--cyan)}.code .v{color:var(--violet)}
  .caret{display:inline-block;width:8px;height:1.05em;background:var(--accent);vertical-align:-2px;animation:bl 1s steps(1) infinite}
  @keyframes bl{50%{opacity:0}}

  /* ===== Terminal ===== */
  .term{font-family:var(--mono);font-size:clamp(11.5px,1vw,14.5px);line-height:1.85;background:var(--inset);border:1px solid var(--line);border-radius:var(--r-md);padding:18px 22px;white-space:pre-wrap;overflow:auto;color:#c6cdd7}
  .term .p{color:var(--accent-2)}.term .ok{color:var(--ok)}.term .no{color:var(--danger)}.term .c{color:var(--faint)}.term .w{color:var(--warn)}

  /* ===== Cahier des charges (points demandés) ===== */
  .reqs{display:flex;flex-direction:column;gap:12px;margin-top:22px}
  .req{border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:var(--r-sm);padding:14px 18px;background:var(--bg-1)}
  .req .w{display:flex;gap:10px;align-items:baseline;font-size:clamp(14px,1.15vw,17px);font-weight:700}
  .req .w .tick{color:var(--ok);font-weight:800}
  .req .w .tag{margin-left:auto;font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);border:1px solid var(--line);padding:2px 8px;border-radius:var(--r-pill)}
  .req .g{color:var(--dim);font-size:14px;margin-top:7px;line-height:1.5}
  .req .g code{font-family:var(--mono);color:var(--accent-2)}

  /* ===== Routes déroulantes ===== */
  .rgroup{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--faint);margin:16px 0 6px}
  .rgroup:first-child{margin-top:0}
  .route{border:1px solid var(--line);border-radius:var(--r-sm);background:var(--bg-1);margin-bottom:6px;overflow:hidden}
  .route-head{display:flex;align-items:center;gap:13px;padding:9px 14px;cursor:pointer;font-family:var(--mono);font-size:13.5px;user-select:none}
  .route-head:hover{background:var(--bg-2)}
  .route-path{color:var(--text)}
  .route-guard{margin-left:auto;font-size:11px;color:var(--faint);white-space:nowrap}
  .route-chev{color:var(--faint);transition:transform .2s;font-size:11px}
  .route.open .route-chev{transform:rotate(90deg)}
  .route-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .route.open .route-body{max-height:260px}
  .route-body .in{padding:4px 16px 14px;color:var(--dim);font-size:13.5px;line-height:1.55;border-top:1px solid var(--line)}
  .route-body .in code{font-family:var(--mono);color:var(--accent-2)}
  .badge{font-family:var(--mono);font-size:10px;font-weight:800;letter-spacing:.03em;padding:3px 7px;border-radius:5px;min-width:52px;text-align:center;flex:0 0 auto}
  .b-get{color:var(--ok);background:rgba(46,194,126,.13);border:1px solid rgba(46,194,126,.3)}
  .b-post{color:var(--accent-2);background:var(--accent-soft);border:1px solid var(--accent-line)}
  .b-put{color:var(--warn);background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.3)}
  .b-patch{color:var(--violet);background:rgba(176,123,255,.12);border:1px solid rgba(176,123,255,.3)}
  .b-del{color:var(--danger);background:rgba(255,91,91,.12);border:1px solid rgba(255,91,91,.3)}
  .b-all{color:var(--dim);background:rgba(255,255,255,.05);border:1px solid var(--line)}

  /* ===== Blocs génériques ===== */
  .split{display:grid;grid-template-columns:1fr 1.05fr;gap:clamp(22px,3vw,54px);align-items:center;min-height:0}
  .split .txt{min-width:0}.split .media{min-width:0}
  ul.feat{list-style:none;margin-top:14px;display:flex;flex-direction:column;gap:11px}
  ul.feat li{display:flex;gap:12px;align-items:flex-start;font-size:clamp(13.5px,1.1vw,16px);line-height:1.4}
  ul.feat li::before{content:"+";color:var(--accent-2);font-family:var(--mono);font-weight:800;margin-top:1px}
  ul.feat li b{color:var(--text);font-weight:700}ul.feat li span{color:var(--dim)}
  .arch{display:flex;gap:14px;align-items:stretch;margin-top:26px}
  .node{flex:1;border:1px solid var(--line-strong);border-radius:var(--r-md);padding:20px;background:var(--bg-1);position:relative}
  .node.hi{border-color:var(--accent-line);background:linear-gradient(180deg,var(--accent-soft),var(--bg-1))}
  .node .t{font-weight:800;font-size:17px;margin-bottom:5px}.node .s{color:var(--dim);font-size:13px;line-height:1.45}
  .node .tag{position:absolute;top:-10px;left:18px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:var(--bg-3);border:1px solid var(--line-strong);color:var(--dim);padding:2px 8px;border-radius:var(--r-pill)}
  .node.hi .tag{background:var(--accent);color:#fff;border-color:transparent}
  .link{display:flex;align-items:center;color:var(--faint);font-family:var(--mono);font-size:16px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px}
  .box{border:1px solid var(--line);border-radius:var(--r-md);padding:20px 22px;background:var(--bg-1)}
  .box h3{font-family:var(--mono);font-size:13px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}
  .box.p h3{color:var(--ok)}.box.a h3{color:var(--danger)}.box.h h3{color:var(--cyan)}.box.l h3{color:var(--warn)}
  .box ul{list-style:none;display:flex;flex-direction:column;gap:9px}
  .box li{display:flex;gap:9px;font-size:14px;line-height:1.4;color:var(--dim)}
  .box li::before{content:"—";color:var(--faint)}
  .box li b{color:var(--text);font-weight:600}
  .chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:18px}
  .chip{font-family:var(--mono);font-size:12px;color:var(--text);background:var(--bg-2);border:1px solid var(--line-strong);padding:7px 12px;border-radius:var(--r-pill)}

  /* Cover */
  .cover .logo{display:flex;align-items:center;gap:16px;margin-bottom:26px}
  .cover .logo img{width:56px;height:56px;filter:drop-shadow(0 8px 24px rgba(61,109,253,.5))}
  .cover .logo .word{font-size:clamp(34px,4.6vw,60px);font-weight:800;letter-spacing:-.03em;background:linear-gradient(90deg,#cdd6ff,var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .cover .meta{margin-top:26px;display:flex;flex-direction:column;gap:6px}
  .cover .meta .row{display:flex;gap:11px;align-items:center;font-size:14.5px;color:var(--dim)}
  .cover .meta .row .tag{font-family:var(--mono);font-size:11px;color:var(--accent-2);border:1px solid var(--accent-line);background:var(--accent-soft);padding:3px 9px;border-radius:var(--r-pill)}
  .cover .team{margin-top:20px;font-family:var(--mono);font-size:12.5px;color:var(--faint);letter-spacing:.03em}

  /* ===== Slides de scan (grype / trivy) — mêmes maquettes, thème sombre ===== */
  .scan-alert{display:flex;align-items:center;gap:16px;padding:13px 18px;border-radius:var(--r-md);margin-top:16px;font-size:14px;line-height:1.4}
  .scan-alert.warn{background:rgba(255,91,91,.08);border:1px solid rgba(255,91,91,.3)}
  .scan-alert.ok{background:rgba(46,194,126,.08);border:1px solid rgba(46,194,126,.3)}
  .scan-alert .ico{font-size:20px;flex:0 0 auto}
  .scan-alert .txt{flex:1}.scan-alert .txt b{color:var(--text)}
  .scan-alert.ok .txt b{color:var(--ok)}
  .counts{display:flex;gap:9px;margin-left:auto;flex:0 0 auto}
  .count{text-align:center;padding:6px 12px;border-radius:var(--r-sm);border:1px solid var(--line);min-width:60px}
  .count .n{font-family:var(--mono);font-size:19px;font-weight:800;line-height:1}
  .count .l{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--faint);margin-top:3px}
  .count.crit .n,.count.low .n{color:var(--faint)}
  .count.high{border-color:rgba(255,91,91,.4);background:rgba(255,91,91,.08)}.count.high .n{color:var(--danger)}
  .count.med{border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.08)}.count.med .n{color:var(--warn)}
  .vtable{width:100%;border-collapse:collapse;margin-top:16px;font-size:13px;border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden}
  .vtable th{background:var(--bg-3);color:var(--dim);font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;text-align:left;padding:10px 14px;font-weight:700}
  .vtable td{padding:10px 14px;border-top:1px solid var(--line);color:var(--text)}
  .vtable tr:nth-child(odd) td{background:var(--bg-1)}
  .vtable .fix{color:var(--ok);font-weight:700}
  .vtable .lnk{color:var(--accent-2);font-family:var(--mono)}
  .vtable .mono{font-family:var(--mono);color:var(--dim)}
  .sev{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:800;padding:3px 9px;border-radius:5px;letter-spacing:.03em}
  .sev.high{color:#fff;background:var(--danger)}
  .sev.med{color:#241905;background:var(--warn)}
  .tcards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px}
  .tcard{border:1px solid var(--line-strong);border-radius:var(--r-md);padding:18px 14px;text-align:center;background:var(--bg-1)}
  .tcard.ok{border-color:rgba(46,194,126,.35);background:linear-gradient(180deg,rgba(46,194,126,.06),var(--bg-1))}
  .tcard.warn{border-color:rgba(245,166,35,.4);background:linear-gradient(180deg,rgba(245,166,35,.07),var(--bg-1))}
  .tcard.danger{border-color:rgba(255,91,91,.4);background:linear-gradient(180deg,rgba(255,91,91,.07),var(--bg-1))}
  .tcard .ico{font-size:20px}
  .tcard .name{font-weight:800;font-size:16px;margin:8px 0 2px}
  .tcard .os{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .tcard .res{margin-top:12px;font-size:13px;font-weight:700}
  .tcard.ok .res{color:var(--ok)}.tcard.warn .res{color:var(--warn)}.tcard.danger .res{color:var(--danger)}
  .rowline{display:flex;justify-content:space-between;align-items:baseline;margin-top:22px}

  .hint{position:fixed;z-index:20;top:16px;right:clamp(18px,3vw,40px);font-family:var(--mono);font-size:11px;color:var(--faint);opacity:0;transition:opacity .4s}
  body:hover .hint{opacity:.7}
  kbd{font-family:var(--mono);border:1px solid var(--line-strong);border-radius:5px;padding:1px 6px;color:var(--dim);font-size:10.5px}
  @media (max-width:900px){.split,.arch,.grid2{grid-template-columns:1fr;display:flex;flex-direction:column}}
  @media (prefers-reduced-motion:reduce){.slide{transition:opacity .001s}.caret{animation:none}}
</style>
</head>
<body>

<div class="hint">← → naviguer · <kbd>F</kbd> plein écran · clic sur une route pour déplier</div>
<div id="deck"></div>
<div id="hud"><div id="bar"></div></div>
<div id="dots"></div>
<div id="counter"><b>01</b> / 15</div>
<div id="brand-hud"><img src="assets/poulpium-mark.png" alt=""><span>Poulpium · Pôle 2</span></div>

<script>
const R=(m,p,g,d)=>`<div class="route"><div class="route-head"><span class="badge b-${m.toLowerCase()}">${m}</span><span class="route-path">${p}</span><span class="route-guard">${g}</span><span class="route-chev">▶</span></div><div class="route-body"><div class="in">${d}</div></div></div>`;

const slides = [

/* 1 — COVER */
`<section class="slide cover">
  <div class="logo"><img src="assets/poulpium-mark.png" alt="Poulpium"><span class="word">Poulpium</span></div>
  <div class="kicker">Pôle 2 · Infra, Sécurité & Cloud</div>
  <h1>Le back-end qui ne fait<br>confiance à personne.</h1>
  <p class="lede">Deux sujets livrés : chiffrer le flux et verrouiller la clé (Zero-Trust), puis détecter et bloquer l'aspiration en temps réel. NestJS, 100 % local.</p>
  <div class="editor" style="margin-top:26px;max-width:720px">
    <div class="etop"><div class="dots"><i></i><i></i><i></i></div><div class="etab on">proof.sh</div></div>
    <div class="code" id="tw"></div>
  </div>
  <div class="meta">
    <div class="row"><span class="tag">Sujet A</span> Diffusion « Zero-Trust » — HLS chiffré + clé éphémère</div>
    <div class="row"><span class="tag">Sujet B</span> Détection des menaces & Anti-Scraping</div>
  </div>
  <div class="team">Hackathon ESTIAM — Groupe 7   ·   Équipe P2 : Enzo (lead) · William · Ryan · Gabriel</div>
</section>`,

/* 2 — ARCHITECTURE */
`<section class="slide">
  <div class="kicker">Où se place le Core</div>
  <h2>Une seule porte, gardée par le Core.</h2>
  <div class="arch">
    <div class="node"><span class="tag">View · P1</span><div class="t">React / Vite</div><div class="s">Demande. Ne détient jamais la clé ni les droits.</div></div>
    <div class="link">— JWT →</div>
    <div class="node hi"><span class="tag">Core · P2</span><div class="t">NestJS</div><div class="s">Auth, clés AES, ACL multi-tenant, anti-scraping, orchestration.</div></div>
    <div class="link">— service →</div>
    <div class="node"><span class="tag">Engine · P3</span><div class="t">FastAPI</div><div class="s">IA locale. Appelée seulement par le Core (token de service).</div></div>
  </div>
  <p class="lede" style="margin-top:26px">Le back-end est le <b style="color:var(--text)">seul décideur</b> : qui voit quoi, qui reçoit quelle clé, qui a le droit d'analyser. Tout le reste demande la permission.</p>
</section>`,

/* 3 — SUJET A : cahier des charges */
`<section class="slide">
  <div class="kicker">Sujet A · ce que le sujet exige</div>
  <h2>Diffuser une vidéo que personne ne peut piller.</h2>
  <div class="reqs scroll" style="max-height:66vh">
    <div class="req"><div class="w"><span class="tick">✓</span> Diffusion HLS (playlist + segments) <span class="tag">exigé</span></div>
      <div class="g">La vidéo est servie en HLS : un manifeste <code>index.m3u8</code> + des segments <code>.ts</code>, jamais un fichier unique téléchargeable.</div></div>
    <div class="req"><div class="w"><span class="tick">✓</span> Flux chiffré AES-128 <span class="tag">exigé</span></div>
      <div class="g">À l'ingestion, ffmpeg chiffre chaque segment en AES-128 (<code>-hls_key_info_file</code>) avec une clé + IV propres au contenu.</div></div>
    <div class="req"><div class="w"><span class="tick">✓</span> Clé délivrée seulement sur token valide — refus par défaut <span class="tag">exigé</span></div>
      <div class="g"><code>GET /keys/:id</code> gardé par le JWT + l'ACL. Sans token, expiré, mauvais tenant ou clé révoquée → <code>401 / 403 / 404</code>. C'est le serveur de clés éphémères.</div></div>
    <div class="req"><div class="w"><span class="tick">✓</span> Déploiement local en une commande <span class="tag">exigé</span></div>
      <div class="g"><code>docker compose up</code> lance core + frontend + hls + engine. Aucune étape manuelle obscure.</div></div>
    <div class="req"><div class="w"><span class="tick">✓</span> Sans cloud payant <span class="tag">exigé</span></div>
      <div class="g">Tout tourne en local (Docker). Aucune dépendance à un service payant.</div></div>
    <div class="req"><div class="w"><span class="tick">✓</span> Modèle de menace assumé <span class="tag">évalué</span></div>
      <div class="g">Quoi protéger, contre quoi, hypothèses et limites — détaillé en fin de présentation (+ <code>docs/P2-threat-model.md</code>).</div></div>
  </div>

/* 4 — SUJET A : serveur de clés (code) */

/* ============ Moteur ============ */
const deck=document.getElementById('deck');
deck.innerHTML=slides.join('');
const els=[...deck.querySelectorAll('.slide')];
const dots=document.getElementById('dots'),bar=document.getElementById('bar'),counter=document.getElementById('counter');
let i=0;const pad=n=>String(n).padStart(2,'0');
els.forEach((_,n)=>{const b=document.createElement('button');b.onclick=()=>go(n);dots.appendChild(b);});
const dotEls=[...dots.children];
function go(n){
  i=Math.max(0,Math.min(els.length-1,n));
  els.forEach((s,k)=>s.classList.toggle('active',k===i));
  dotEls.forEach((d,k)=>d.classList.toggle('on',k===i));
  bar.style.width=((i+1)/els.length*100)+'%';
  counter.innerHTML=`<b>${pad(i+1)}</b> / ${pad(els.length)}`;
  location.hash=i+1;
}
function next(){go(i+1);}function prev(){go(i-1);}
addEventListener('keydown',e=>{
  if(['ArrowRight','ArrowDown','PageDown'].includes(e.key)){e.preventDefault();next();}
  else if(['ArrowLeft','ArrowUp','PageUp','Backspace'].includes(e.key)){e.preventDefault();prev();}
  else if(e.key==='Home'){go(0);}else if(e.key==='End'){go(els.length-1);}
  else if(e.key==='f'||e.key==='F'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
});
/* Accordéon routes (déroulant) */
deck.addEventListener('click',e=>{
  const h=e.target.closest('.route-head');
  if(h){e.stopPropagation();h.parentElement.classList.toggle('open');}
});
/* Navigation au clic (zones latérales) — ignore les zones interactives/code */
addEventListener('click',e=>{
  if(e.target.closest('#dots,.hint,#brand-hud,.route,.routes,.editor,.term,.scroll'))return;
  const x=e.clientX/innerWidth;if(x>0.66)next();else if(x<0.18)prev();
});
/* Typewriter (code dynamique) — respecte prefers-reduced-motion */
(function(){
  const el=document.getElementById('tw');if(!el)return;
  const lines=[
    ['c','# preuve Zero-Trust'],
    ['p','$ curl /keys/poc'],
    ['no','401  refus par défaut'],
    ['p','$ curl -H "Bearer $ALICE" /keys/poc'],
    ['ok','200  clé AES-128 délivrée']
  ];
  const cls={c:'c',p:'k',no:'r',ok:'s'};
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(reduce){el.innerHTML=lines.map(([t,x])=>`<span class="${cls[t]}">${x}</span>`).join('\n');return;}
  let li=0,ci=0,html='';
  (function tick(){
    if(li>=lines.length){el.innerHTML=html+'<span class="caret"></span>';return;}
    const [t,txt]=lines[li];
    if(ci===0)html+=`<span class="${cls[t]}">`;
    el.innerHTML=html+txt.slice(0,ci)+'</span><span class="caret"></span>';
    ci++;
    if(ci>txt.length){html+=txt+'</span>\n';li++;ci=0;setTimeout(tick,260);}
    else setTimeout(tick,22);
  })();
})();
const start=parseInt(location.hash.slice(1));go(Number.isFinite(start)&&start?start-1:0);
</script>
