name: Build and Push to GHCR

on:
  push:
    branches:
      - backend-security # push sur la branche backend-security (P2)
      - master # push/merge sur master -> rebuild des images :latest (prod)
  workflow_dispatch: {} # declenchement manuel depuis l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Connexion au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.OWNER }}/hackathon-backend:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.OWNER }}/hackathon-frontend:latest

      # Engine IA (Pôle 3). Publié pour que le NAS le TIRE (comme core/frontend)
      # au lieu de le construire sur place -> plus aucun build côté NAS, et
      # Watchtower peut l'auto-mettre à jour. Build lourd (torch CPU + modèle GGUF).
      - name: Build & Push Engine
        uses: docker/build-push-action@v5
        with:
          context: ./engine
          push: true
          tags: ghcr.io/${{ env.OWNER }}/hackathon-engine:latest
