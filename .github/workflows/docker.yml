name: Build and Push to GHCR

on:
  push:
    branches:
      - backend-security # L'action se déclenche à chaque push sur la branche backend-security

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hackathon-backend:latest

      # ⏸️ Étape frontend désactivée : `frontend/` n'a pas encore de Dockerfile
      # (à fournir par le Pôle 1). La réactiver dès que `frontend/Dockerfile` existe,
      # sinon le job échoue à chaque push.
