server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Temps réel (socket.io) : proxy AVEC upgrade WebSocket. Indispensable pour la
  # collaboration en direct (watch-together, commentaires, présence, curseurs)
  # entre navigateurs/machines/réseaux différents. Sans ce bloc, le socket
  # retombe sur la SPA (index.html) et le temps réel ne marche pas en prod.
  location /socket.io/ {
    proxy_pass http://core:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
  }

  # Routes API + flux vidéo → backend NestJS
  location ~ ^/(auth|keys|admin|security|contents|videos)(/|$) {
    proxy_pass http://core:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    client_max_body_size 1024m;
  }

  # Frontend React (SPA) — toujours renvoyer index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
